<div id="relogio"></div>

<script>
function atualizarRelogio(){

let agora = new Date();

let brasil = agora.toLocaleString("pt-BR", {
timeZone: "America/Sao_Paulo",
hour: "2-digit",
minute: "2-digit",
second: "2-digit"
});

document.getElementById("relogio").innerHTML =
"🕒 Horário de Brasília: " + brasil;

}

setInterval(atualizarRelogio,1000);
atualizarRelogio();

</script>
